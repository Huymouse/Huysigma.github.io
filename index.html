<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huydeptraivcl</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <header>
        <h1>✨ Tú mùi ✨</h1>
        <p>ấn đi em ei!</p>
        <div class="progress-container">
            <div class="progress-bar" id="progressText">Tiến trình: 0 / 12 túi đã mất trink</div>
        </div>
    </header>

    <main class="grid-container" id="boxContainer">
    </main>

    <div id="customPopup" class="popup-overlay hidden">
        <div class="popup-content">
            <h3>⚠️ oi oi oi!</h3>
            <p>Bạn có sủe không?</p>
            <div class="popup-buttons">
                <button id="btnCancel" class="btn btn-cancel">Thôi, em rén!</button>
                <button id="btnConfirm" class="btn btn-confirm">Bố đếch sợ!</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
