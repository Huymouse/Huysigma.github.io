<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>test 08</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    
    <button id="btnReset" class="btn-reset-top">🔄 Restart</button>

    <header>
        <h1>✨ Tú mùi ✨</h1>
        <p>Chúc các chị em 12C8 ngày quốc tế phụ nữ 8/3 vui vẻ nha!</p>
        <div class="progress-container">
            <div class="progress-bar" id="progressText">Tiến trình: 0 / 22 túi đã mất trink</div>
        </div>
    </header>

    <main class="grid-container" id="boxContainer"></main>

    <div class="nav-container">
        <a href="page2.html" class="nav-btn">Sang tiếp 10 túi nữa ➡️</a>
    </div>

    <div id="customPopup" class="popup-overlay hidden">
        <div class="popup-content">
            <h3>⚠️ Khoan đã!</h3>
            <p>Bạn có chắc chắn với lựa chọn của mình không?</p>
            <div class="popup-buttons">
                <button id="btnCancel" class="btn btn-cancel">Tớ hèn.</button>
                <button id="btnConfirm" class="btn btn-confirm">Rất chắc chắn</button>
            </div>
        </div>
    </div>

    <div id="resetPopup" class="popup-overlay hidden">
        <div class="popup-content">
            <h3>⚠️ Ê!</h3>
            <p>Toàn bộ lịch sử mở túi sẽ bay màu (thằng code web không thích điều này)</p>
            <div class="popup-buttons">
                <button id="btnCancelReset" class="btn btn-cancel">Khum</button>
                <button id="btnConfirmReset" class="btn btn-confirm">Ok</button>
            </div>
        </div>
    </div>

   <script src="script.js"></script>
